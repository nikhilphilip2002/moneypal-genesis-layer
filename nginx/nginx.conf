# Reverse proxy for the moneypal stack. Mounted into the nginx container as
# /etc/nginx/conf.d/default.conf. Host port 46100 maps to this server's :80.
#
#   /api/*  -> backend  (FastAPI, /api prefix stripped: /api/auth/login -> /auth/login)
#   /health -> backend health check
#   /*      -> frontend (Next.js)

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # LLM-backed endpoints can be slow; don't cut them off at nginx's 60s default.
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass http://backend/;
    }

    location = /health {
        proxy_pass http://backend/health;
    }

    location / {
        proxy_pass http://frontend;
        # Websocket upgrade (Next.js HMR in dev; harmless in prod).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
