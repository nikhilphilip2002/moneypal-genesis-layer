[project]
name = "genesis-core"
version = "0.1.0"
description = "Shared schema, settings and Direct RAG engine for the Moneypal Genesis Layer"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2",
    "pydantic-settings>=2",
    "qdrant-client",
    "sentence-transformers",
    "groq",
    "pypdf",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/genesis_core"]
