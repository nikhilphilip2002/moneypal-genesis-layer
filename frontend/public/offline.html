<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aroha — Offline</title>
<style>
  html, body { margin: 0; height: 100%; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: #1F1A14; background: #FBF6EE; }
  .wrap { min-height: 100%; display: grid; place-items: center; padding: 24px; text-align: center; }
  .card {
    max-width: 360px; padding: 32px; border-radius: 24px;
    background: rgba(255,255,255,0.7); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.7); box-shadow: 0 8px 32px rgba(31,26,20,0.08);
  }
  .logo { width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 16px; background: linear-gradient(135deg,#DD7A3A,#F5A06C); color: white; display: grid; place-items: center; font-weight: 800; font-size: 24px; }
  h1 { margin: 0 0 8px; font-size: 20px; }
  p { margin: 0; color: #6B5E4F; font-size: 14px; line-height: 1.5; }
  button { margin-top: 20px; padding: 10px 18px; border: 0; border-radius: 12px; background: linear-gradient(135deg,#DD7A3A,#F5A06C); color: white; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">A</div>
      <h1>You're offline</h1>
      <p>Aroha can't reach the network right now. Cached pages still work — try again when you're back online.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </div>
</body>
</html>
